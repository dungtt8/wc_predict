name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1.106.2
        with:
          version: 1.106.2

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database changes
        run: supabase db push

      - name: Set Supabase secrets
        run: |
          supabase secrets set SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          supabase secrets set SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          supabase secrets set API_FOOTBALL_KEY="${{ secrets.API_FOOTBALL_KEY }}"

      - name: Deploy sync-fixtures function
        run: supabase functions deploy sync-fixtures

      - name: Deploy recompute-room-rankings function
        run: supabase functions deploy recompute-room-rankings
